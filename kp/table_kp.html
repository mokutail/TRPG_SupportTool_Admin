<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卓管理ツール (KP)</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="table_kp.css">
</head>
<body class="body">
<h2 class="tool-header">
    <span class="header-title">🗓️ 卓管理 (KP)</span>
    <button class="back-btn" onclick="location.href='../index.html'">🏠 戻る</button>
</h2>

<div id="table-view" class="view">

    <div class="system-tabs" id="systemTabs">
    </div>

    <div class="input-group">
        <div class="filter-toggle-btn" id="filterToggleBtn">
            🔍 KP卓を検索・絞り込み <span class="arrow">▼</span>
        </div>
        <div class="filter-box" id="filterBox">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="filterScenario" placeholder="シナリオ名で検索" class="sc-band-input">
                <input type="text" id="filterPlayers" placeholder="PL名で検索" class="sc-band-input">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="filterTags" placeholder="タグで検索" class="sc-band-input">
                <div class="custom-select-wrapper" id="filterStatusWrapper">
                    <div class="select-display" id="filterStatusDisplay">状態</div>
                    <div class="select-options" id="filterStatusOptions">
                        <div class="option-item" data-value="すべて">すべて</div>
                        <div class="option-item" data-value="予定">予定</div>
                        <div class="option-item" data-value="回し中">回し中</div>
                        <div class="option-item" data-value="完走">完走</div>
                        <div class="option-item" data-value="流卓">流卓</div>
                    </div>
                </div>
            </div>
            <input type="hidden" id="filterStatusHidden" value="すべて">

            <button id="btnResetFilter">🔄 絞り込みをリセット</button>
            <div class="hit-count-display">該当件数: <strong id="kpHitCount">0</strong> 件</div>
        </div>
    </div>

    <div class="input-group">
        <label class="group-label" id="formTitleLabel">✏️ 新規KP卓の登録</label>

        <div style="display: grid; grid-template-columns: 90px 1fr; gap: 15px; margin-bottom: 12px;">
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div class="image-upload-wrapper" id="imageUploadWrapper">
                    <div id="imagePreview" class="image-preview">
                        <span id="imagePreviewText">画像<br>(タップ)</span>
                    </div>
                    <input type="file" id="kpImage" accept="image/*" style="display:none;">
                </div>
                <button type="button" class="clear-img-btn" id="btnClearImage" style="display:none;">クリア</button>
            </div>
            <div style="display:flex; flex-direction:column; justify-content:center;">
                <input type="text" id="kpScenario" placeholder="*シナリオ名*" class="sc-band-input" style="height: 90px; font-size: 18px;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
            <input type="number" id="kpZin" placeholder="何陣目？" class="sc-band-input">
            <input type="text" id="kpDate" placeholder="卓開始日" class="sc-band-input" onfocus="this.type='date'" onblur="if(!this.value)this.type='text'">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
            <input type="text" id="kpPlayers" placeholder="参加PL名" class="sc-band-input">

            <div class="custom-select-wrapper" id="kpStatusWrapper">
                <div class="select-display" id="kpStatusDisplay">予定</div>
                <div class="select-options" id="kpStatusOptions">
                    <div class="option-item" data-value="予定">予定</div>
                    <div class="option-item" data-value="回し中">回し中</div>
                    <div class="option-item" data-value="完走">完走</div>
                    <div class="option-item" data-value="流卓">流卓</div>
                </div>
            </div>
            <input type="hidden" id="kpStatusHidden" value="予定">
        </div>

        <div style="margin-bottom:12px;">
            <input type="text" id="kpTags" placeholder="タグ" class="sc-band-input">
        </div>

        <div style="margin-bottom:12px;">
            <input type="url" id="kpDocUrl" placeholder="資料/PDF/ドキュメント URL" class="sc-band-input">
        </div>
        <div style="margin-bottom:12px;">
            <input type="url" id="kpBoothUrl" placeholder="Booth URL" class="sc-band-input">
        </div>
        <div style="margin-bottom:15px;">
            <input type="url" id="kpCcfoliaUrl" placeholder="ココフォリア URL" class="sc-band-input">
        </div>

        <button class="action-btn" id="btnAddKp">リストに追加</button>
    </div>

    <div class="input-group">
        <label class="group-label">📊 KP卓 管理リスト</label>
        <div id="kpListContainer"></div>
    </div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="table_kp.js"></script>
</body>
</html>
