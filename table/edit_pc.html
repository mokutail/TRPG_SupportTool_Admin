<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索者の編集</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="table.css">
</head>
<body class="body">
<h2 class="tool-header">
    <span class="header-title">✍️ 探索者の編集</span>
    <button class="back-btn" onclick="location.href='detail.html'">🏠 戻る</button>
</h2>

<div class="view" style="padding-top:10px;">
    <div class="input-group">
        <label class="group-label">👤 基本情報</label>

        <div style="display: grid; grid-template-columns: 90px 1fr; gap: 15px; margin-bottom: 12px;">
            <div style="display:flex; flex-direction:column; align-items:center;">
                <div class="image-upload-wrapper" id="editImageUploadWrapper">
                    <div id="editImagePreview" class="image-preview"><span id="editImagePreviewText">顔写真<br>(タップ)</span></div>
                    <input type="file" id="editPcImage" accept="image/*" style="display:none;">
                </div>
                <button type="button" class="clear-img-btn" id="editBtnClearImage" style="display:none;">クリア</button>
            </div>
            <div style="display:flex; flex-direction:column; justify-content:center; gap: 8px;">
                <input type="text" id="editPcKana" placeholder="名前の読み方" class="sc-band-input" style="padding: 10px 14px; font-size: 14px;">
                <input type="text" id="editPcName" placeholder="PC名 (探索者名)" class="sc-band-input" style="padding: 14px; font-size: 16px;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
            <div class="custom-select-wrapper" id="editPcGenderWrapper">
                <div class="select-display" id="editPcGenderDisplay" style="padding: 14px 10px; font-size: 14px; text-align: center; justify-content: center;">性別</div>
                <div class="select-options" id="editPcGenderOptions"></div>
            </div>
            <input type="hidden" id="editPcGenderHidden" value="">

            <input type="text" id="editPcHeightInput" placeholder="身長 (例: 170cm)" class="sc-band-input" style="padding: 14px 10px; font-size: 14px; text-align: center;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
            <input type="text" id="editPcAgeInput" placeholder="年齢 (例: 24)" class="sc-band-input" style="padding: 14px 10px; font-size: 14px; text-align: center;">
            <input type="text" id="editPcBirthdayInput" placeholder="誕生日 (例: 0405)" class="sc-band-input" style="padding: 14px 10px; font-size: 14px; text-align: center;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
            <div class="custom-select-wrapper" id="editPcRaceWrapper">
                <div class="select-display" id="editPcRaceDisplay" style="padding: 14px 10px; font-size: 14px; text-align: center; justify-content: center;">種族</div>
                <div class="select-options" id="editPcRaceOptions"></div>
            </div>
            <input type="hidden" id="editPcRaceHidden" value="">

            <div class="custom-select-wrapper" id="editPcJobWrapper">
                <div class="select-display" id="editPcJobDisplay" style="padding: 14px 10px; font-size: 14px; text-align: center; justify-content: center;">職業</div>
                <div class="select-options" id="editPcJobOptions"></div>
            </div>
            <input type="hidden" id="editPcJobHidden" value="">
        </div>

        <div style="margin-bottom:12px;">
            <input type="text" id="editPcTags" placeholder="タグ" class="sc-band-input">
        </div>
        <div style="margin-bottom:12px;">
            <input type="url" id="editPcUrl" placeholder="キャラシURL" class="sc-band-input">
        </div>
        <div style="margin-bottom:15px;">
            <textarea id="editPcIachara" placeholder="▼ いあきゃらのコマ出力(JSON)やチャパレを貼り付けると上書き更新されます" class="sc-band-input" style="height: 60px; resize: none; font-size: 12px;"></textarea>
        </div>
    </div>

    <div class="input-group">
        <label class="group-label">📌 通過シナリオ履歴の編集</label>
        <div id="editHistoryContainer"></div>
        <button id="btnAddHistoryRow" style="width:100%; padding:12px; background:#e8f5e9; color:#2e7d32; border:2px dashed #a5d6a7; border-radius:12px; font-weight:bold; cursor:pointer; margin-bottom: 25px;">＋ 履歴を追加</button>

        <button class="action-btn edit-mode" id="btnSaveEdit">💾 変更を保存して戻る</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="edit_pc.js"></script>
</body>
</html>
