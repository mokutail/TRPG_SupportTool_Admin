<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoCルールブック (管理者専用)</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="rulebook.css">
</head>
<body class="body">
<div class="tool-header">
    <h2 class="header-title">📖 CoCルールブック</h2>
    <button class="back-btn" onclick="window.location.href='../index.html'">🏠 戻る</button>
</div>

<div id="rulebook-view" class="view" style="display: none; max-width: 800px; margin: 0 auto;">
    
    <div class="header-actions">
        <button id="toggle-edit-btn" class="toggle-btn">🔓 編集モード</button>
    </div>
    
    <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" class="search-input" placeholder="ルール名や技能を検索...">
    </div>

    <div id="input-form-area" class="form-card hidden">
        <h3 class="form-card-title">✏️ 新しいルールを登録</h3>
        <input type="text" id="rule-title" class="form-input" placeholder="タイトル (例: 狂気の発作)">
        <input type="text" id="rule-category" class="form-input" placeholder="カテゴリ (例: 狂気, 技能, 戦闘)">
        <textarea id="rule-content" class="form-textarea" placeholder="ルールの詳細内容を手打ち..."></textarea>
        <button id="save-btn" class="save-btn">💾 保存する</button>
    </div>

    <div class="input-group">
        <div id="rules-list">
            </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="rulebook.js"></script>
</body>
</html>
