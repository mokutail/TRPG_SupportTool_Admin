<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ルール詳細</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="rulebook.css">
</head>
<body class="body">
<div class="tool-header">
    <h2 class="header-title">📖 ルール詳細</h2>
    <button class="back-btn" onclick="window.location.href='rulebook.html'">🏠 戻る</button>
</div>

<div id="detail-view" class="view" style="display: none; max-width: 800px; margin: 0 auto;">
    
    <div id="read-mode-area">
        <div class="header-actions" id="admin-action-btns" style="display: none;">
            <button id="start-edit-btn" class="toggle-btn" style="margin-right: 10px;">✏️ 修正する</button>
            <button id="delete-btn" class="toggle-btn" style="background: #ffebee; color: #d32f2f; border-color: #d32f2f;">🗑️ 削除</button>
        </div>

        <div class="rule-card" style="cursor: default;">
            <div id="display-badges" style="margin-bottom: 15px;"></div>
            <div id="display-source" class="rule-source" style="display:none;"></div>
            <h1 id="display-title" style="margin-top: 0; color: #2c3e50; font-size: 24px; border-bottom: 2px solid #eee; padding-bottom: 10px;"></h1>
            <div id="display-content" class="rule-content" style="font-size: 16px; line-height: 1.8;"></div>
            <div id="display-table-area"></div>
        </div>
    </div>

    <div id="edit-mode-area" class="form-card hidden">
        <h3 class="form-card-title">✏️ ルールを修正</h3>
        
        <input type="text" id="rule-title" class="form-input" placeholder="タイトル">
        <input type="text" id="rule-tags" class="form-input" placeholder="タグをカンマ(,)か句点(、)で区切って入力">
        
        <div class="form-row">
            <input list="rulebook-list" id="rule-book" class="form-input" placeholder="ルルブ/サプリ名">
            <datalist id="rulebook-list">
                <option value="基本(第6版)">
                <option value="新クトゥルフ(第7版)">
                <option value="マレウス・モンストロルム">
            </datalist>
            <input type="text" id="rule-page" class="form-input" placeholder="ページ数">
        </div>

        <textarea id="rule-content" class="form-textarea"></textarea>
        
        <div class="table-input-area">
            <p style="margin-top:0; font-size:13px; font-weight:bold; color:#555;">📋 表データの追加</p>
            <div id="table-rows-container"></div>
            <button id="add-table-row-btn" class="add-row-btn" type="button">＋ 表の行を追加</button>
        </div>

        <label class="checkbox-label">
            <input type="checkbox" id="rule-is-secret">
            🔒 管理者のみに表示する（特別閲覧者には完全に隠す）
        </label>

        <div class="form-row">
            <button id="save-btn" class="save-btn" type="button" style="background-color: #f57c00;">💾 上書き保存</button>
            <button id="cancel-edit-btn" class="save-btn" style="background:#999;" type="button">❌ キャンセル</button>
        </div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="ruledetail.js"></script>
</body>
</html>
