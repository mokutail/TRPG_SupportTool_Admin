<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ログ解析ツール</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="log.css">
</head>
<body class="body">
<h2 class="tool-header">
    <span class="header-title">📑 ログ解析・保存</span>
    <button class="back-btn" onclick="location.href='../index.html'">🏠 戻る</button>
</h2>

<div class="view">
    <div class="cute-main-tabs" id="mainTabs">
        <button class="cute-main-tab-btn active" id="tabAnalyzeBtn">📄 新規解析</button>
        <button class="cute-main-tab-btn" id="tabSavedBtn">📚 保存済みログ</button>
    </div>

    <div id="viewAnalyze">
        <div class="upload-area" id="dropZone" onclick="document.getElementById('logFileInput').click()">
            <div style="font-size:30px; margin-bottom:10px;">⬆️</div>
            <div style="font-weight:bold; color:#76ADAF; margin-bottom:10px;">ココフォリアのログファイル(.html)<br>を選択 または ドロップ</div>
            <input type="file" id="logFileInput" accept=".html" style="display:none;">
            <button class="action-btn" style="width: auto; padding: 10px 20px; display: inline-block;">ファイルを選択</button>
        </div>

        <div id="analyzeResultArea" style="display:none;">
            <div class="filter-buttons" id="filterBtnGroup">
                <button class="filter-btn main-filter active" data-filter="all">ALL</button>
                <button class="filter-btn main-filter" data-filter="critical" style="color:#0277bd;">クリティカル</button>
                <button class="filter-btn main-filter" data-filter="fumble" style="color:#c62828;">ファンブル</button>
                <button class="filter-btn main-filter" data-filter="special" style="color:#e65100;">スペシャル</button>
                <button class="filter-btn main-filter" data-filter="success" style="color:#2e7d32;">成功</button>
                <button class="filter-btn main-filter" data-filter="failure" style="color:#616161;">失敗</button>
            </div>

            <div id="overallStatsArea" style="margin-bottom: 15px; background: #fff; padding: 15px; border-radius: 12px; border: 2px solid #76ADAF; box-shadow: 0 2px 5px rgba(0,0,0,0.05);"></div>

            <div id="parsedListContainer"></div>

            <div style="background:#f8f9fa; padding:15px; border-radius:15px; border:1px solid #eee; margin-top:20px;">
                <label style="font-size:12px; color:#888; font-weight:bold; display:block; margin-bottom:8px;">この解析結果を保存する</label>
                <input type="text" id="saveLogTitle" placeholder="タイトル (例: 満月の無い十五夜)" class="sc-band-input" style="margin-bottom:10px;">
                <button class="action-btn" id="btnSaveLog">💾 クラウドに保存</button>
            </div>
        </div>
    </div>

    <div id="viewSaved" style="display:none;">
        <div style="background:#f8f9fa; padding:15px; border-radius:12px; border:1px solid #ddd; margin-bottom:15px;">
            <label style="font-size:12px; color:#888; font-weight:bold; display:block; margin-bottom:8px;">🔍 保存済みログを検索 / 累計統計</label>
            <input type="text" id="filterLogTitle" placeholder="シナリオ名で検索" class="sc-band-input" style="margin-bottom:10px;">
            <input type="text" id="filterLogChar" placeholder="探索者の名前で検索 (累計データ表示)" class="sc-band-input">
        </div>
        
        <div id="cumulativeStatsArea" style="display:none; margin-bottom:20px; background:#fffaf0; padding:15px; border-radius:12px; border:2px solid #ffb74d; box-shadow:0 2px 5px rgba(0,0,0,0.05);"></div>

        <div id="savedLogList"></div>
    </div>
</div>

<div id="logDetailModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); justify-content:center; align-items:center; z-index:3000;">
    <div class="modal-content" style="background:#fff; width:95%; max-width:500px; max-height:85vh; border-radius:20px; padding:20px; display:flex; flex-direction:column; box-shadow:0 10px 30px rgba(0,0,0,0.2);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="detailModalTitle" style="margin:0; color:#333; font-size:18px; word-break:break-all;"></h3>
            <button onclick="document.getElementById('logDetailModal').style.display='none'" style="background:none; border:none; font-size:20px; color:#999; cursor:pointer;">✖</button>
        </div>
        
        <div class="filter-buttons" id="detailFilterBtnGroup" style="flex-shrink:0;">
            <button class="filter-btn detail-filter active" data-filter="all">ALL</button>
            <button class="filter-btn detail-filter" data-filter="critical" style="color:#0277bd;">クリティカル</button>
            <button class="filter-btn detail-filter" data-filter="fumble" style="color:#c62828;">ファンブル</button>
            <button class="filter-btn detail-filter" data-filter="special" style="color:#e65100;">スペシャル</button>
            <button class="filter-btn detail-filter" data-filter="success" style="color:#2e7d32;">成功</button>
            <button class="filter-btn detail-filter" data-filter="failure" style="color:#616161;">失敗</button>
        </div>

        <div id="detailOverallStatsArea" style="margin-bottom:15px; background:#f0f7f7; padding:12px; border-radius:10px; border:1px solid #76ADAF; flex-shrink:0;"></div>

        <div id="detailParsedListContainer" style="overflow-y:auto; flex:1; padding-right:5px;"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="log.js"></script>
</body>
</html>
